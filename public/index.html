<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Innerview — 나를 인터뷰하다</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{font-family:'Apple SD Gothic Neo','Noto Sans KR',sans-serif;background:#f5f0ff;min-height:100vh;display:flex;justify-content:center;}
.app{width:100%;max-width:390px;min-height:100vh;background:#fafafa;display:flex;flex-direction:column;position:relative;}
.sb{padding:12px 20px 6px;display:flex;justify-content:space-between;font-size:12px;font-weight:600;color:#999;flex-shrink:0;background:#fafafa;}
.scr{display:flex;flex-direction:column;flex:1;overflow-y:auto;padding-bottom:24px;}

/* 홈 헤더 */
.home-header{background:linear-gradient(135deg,#e8d5ff 0%,#d4b8ff 100%);padding:32px 20px 28px;position:relative;overflow:hidden;}
.home-header::before{content:'';position:absolute;right:-20px;top:-20px;width:120px;height:120px;background:rgba(255,255,255,.2);border-radius:50%;}
.home-header::after{content:'';position:absolute;right:20px;top:30px;width:60px;height:60px;background:rgba(255,255,255,.15);border-radius:50%;}
.eyebrow{font-size:11px;color:#9b6fd4;font-weight:700;letter-spacing:2px;text-transform:uppercase;margin-bottom:6px;}
.big-title{font-size:26px;font-weight:900;color:#3d1a6e;line-height:1.25;}
.sub{font-size:13px;color:#7c5aa8;margin-top:6px;}

/* 메뉴 카드 */
.menu-grid{padding:20px 16px 0;display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.menu-card{background:#fff;border-radius:20px;padding:20px 16px;display:flex;flex-direction:column;gap:10px;cursor:pointer;box-shadow:0 2px 12px rgba(0,0,0,.06);transition:all .15s;border:none;text-align:left;}
.menu-card:active{transform:scale(.97);}
.menu-card-icon{width:44px;height:44px;border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:22px;}
.menu-card-title{font-size:14px;font-weight:800;color:#1a1a2e;}
.menu-card-desc{font-size:11px;color:#999;line-height:1.4;}

/* 주간 카드 */
.week-card{margin:16px;background:#fff;border-radius:20px;padding:18px;box-shadow:0 2px 12px rgba(0,0,0,.06);}
.week-label{font-size:11px;font-weight:700;color:#b39ddb;letter-spacing:1px;text-transform:uppercase;margin-bottom:8px;}
.week-stats{display:flex;gap:16px;}
.week-stat{display:flex;flex-direction:column;gap:2px;}
.week-stat-num{font-size:22px;font-weight:900;color:#7c3aed;}
.week-stat-label{font-size:11px;color:#bbb;}

/* 섹션 헤더 */
.page-header{padding:20px 20px 4px;display:flex;align-items:center;gap:10px;}
.back-btn{width:36px;height:36px;border-radius:12px;background:#f0e8ff;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.page-title{font-size:18px;font-weight:900;color:#1a1a2e;}
.page-eyebrow{font-size:10px;color:#b39ddb;font-weight:700;letter-spacing:2px;text-transform:uppercase;}

.sh{display:flex;align-items:center;justify-content:space-between;padding:16px 20px 8px;}
.sl{font-size:15px;font-weight:800;color:#1a1a2e;}
.prev-btn{font-size:12px;color:#b39ddb;background:none;border:none;cursor:pointer;font-family:inherit;display:flex;align-items:center;gap:3px;}

/* 감정 그리드 */
.emo-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;padding:0 16px;}
.emo-btn{background:#fff;border:2px solid #f0e8ff;border-radius:18px;padding:16px 8px;display:flex;flex-direction:column;align-items:center;gap:7px;cursor:pointer;transition:all .15s;box-shadow:0 1px 6px rgba(0,0,0,.04);}
.emo-btn:active,.emo-btn.on{border-color:#9b59d4;background:#f5eeff;}
.emo-icon{font-size:28px;}
.emo-label{font-size:11px;color:#888;font-weight:700;}
.emo-btn.on .emo-label{color:#7c3aed;}

/* 칩 */
.chips{display:flex;flex-wrap:wrap;gap:8px;padding:0 16px;}
.chip{background:#fff;border:2px solid #eee;border-radius:99px;padding:8px 16px;font-size:13px;color:#888;cursor:pointer;font-weight:600;font-family:inherit;transition:all .15s;}
.chip.on{background:#f5eeff;border-color:#9b59d4;color:#7c3aed;}

/* 신체반응 */
.body-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;padding:0 16px;}
.body-btn{background:#fff;border:2px solid #eee;border-radius:14px;padding:12px 14px;font-size:13px;color:#888;cursor:pointer;font-weight:600;text-align:left;font-family:inherit;transition:all .15s;box-shadow:0 1px 4px rgba(0,0,0,.04);}
.body-btn.on{background:#e8f4ff;border-color:#60a5fa;color:#2563eb;}

/* 트리거 */
.trigger-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;padding:0 16px;}
.trigger-btn{background:#fff;border:2px solid #eee;border-radius:14px;padding:14px 8px;font-size:12px;color:#888;cursor:pointer;font-weight:700;font-family:inherit;text-align:center;transition:all .15s;}
.trigger-btn.on{background:#fff8e8;border-color:#f59e0b;color:#d97706;}

/* 관계 타입 */
.rel-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;padding:0 16px;}
.rel-btn{background:#fff;border:2px solid #eee;border-radius:14px;padding:14px 8px;font-size:13px;color:#888;cursor:pointer;font-weight:700;font-family:inherit;text-align:center;transition:all .15s;box-shadow:0 1px 4px rgba(0,0,0,.04);}
.rel-btn:active{background:#f5eeff;border-color:#9b59d4;color:#7c3aed;}

/* 리스트 아이템 */
.list-item{background:#fff;border:2px solid #eee;border-radius:16px;padding:16px 18px;font-size:14px;color:#555;cursor:pointer;font-weight:700;font-family:inherit;text-align:left;width:calc(100% - 32px);margin:0 16px 10px;display:block;transition:all .15s;box-shadow:0 1px 6px rgba(0,0,0,.04);}
.list-item:active{background:#f5eeff;border-color:#9b59d4;color:#7c3aed;}

/* 텍스트에리어 */
textarea{background:#fff;border:2px solid #eee;border-radius:16px;padding:16px;font-size:14px;color:#333;width:calc(100% - 32px);margin:8px 16px 0;resize:none;outline:none;font-family:inherit;line-height:1.7;display:block;transition:border .2s;}
textarea:focus{border-color:#9b59d4;}
textarea::placeholder{color:#ccc;}

/* 버튼 */
.pbtn{width:calc(100% - 32px);margin:14px 16px 0;padding:16px;background:linear-gradient(135deg,#9b59d4,#7c3aed);border:none;border-radius:16px;color:#fff;font-size:15px;font-weight:900;cursor:pointer;font-family:inherit;display:block;box-shadow:0 4px 16px rgba(124,58,237,.35);transition:all .2s;}
.pbtn:disabled{background:#e0d4f7;color:#b39ddb;box-shadow:none;cursor:not-allowed;}
.pbtn:active:not(:disabled){transform:scale(.98);}
.reset-btn{width:calc(100% - 32px);margin:8px 16px;padding:14px;background:#f5f0ff;color:#7c3aed;border:none;border-radius:16px;font-size:14px;font-weight:800;cursor:pointer;font-family:inherit;display:block;}

/* 결과 카드 */
.result-card{margin:16px 16px 10px;background:#fff;border-radius:20px;padding:20px;box-shadow:0 2px 16px rgba(0,0,0,.08);}
.result-green{margin:0 16px 10px;background:linear-gradient(135deg,#ecfdf5,#d1fae5);border-radius:20px;padding:20px;}
.result-label{font-size:10px;font-weight:800;letter-spacing:2px;text-transform:uppercase;margin-bottom:8px;display:block;}
.result-main{font-size:20px;font-weight:900;color:#1a1a2e;margin-bottom:6px;}
.result-match{font-size:13px;font-weight:700;margin-bottom:14px;}
.result-body{font-size:14px;line-height:1.9;color:#555;}
.evidence-box{background:#fafafa;border-radius:12px;padding:14px;margin-top:12px;border-left:3px solid #d4b8ff;}
.evidence-label{font-size:10px;color:#b39ddb;font-weight:800;margin-bottom:6px;letter-spacing:1px;text-transform:uppercase;}
.evidence-text{font-size:13px;color:#777;line-height:1.8;white-space:pre-line;}
.suggestion-text{font-size:14px;line-height:1.9;color:#065f46;white-space:pre-line;}
.warn-box{background:#fff5f5;border-radius:12px;padding:12px;margin-top:12px;border-left:3px solid #fca5a5;}

/* 패턴 */
.stat-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;padding:8px 16px 12px;}
.stat-box{background:#fff;border-radius:16px;padding:14px;text-align:center;box-shadow:0 1px 6px rgba(0,0,0,.05);}
.bar-bg{background:#f0e8ff;border-radius:99px;height:6px;overflow:hidden;}
.bar-fill{height:100%;border-radius:99px;}

/* 로그 */
.log-item{margin:0 16px 10px;background:#fff;border-radius:16px;padding:16px;box-shadow:0 1px 6px rgba(0,0,0,.05);}

/* 토스트 */
.toast{position:fixed;top:60px;left:50%;transform:translateX(-50%) translateY(-8px);background:#7c3aed;color:#fff;font-size:13px;font-weight:700;padding:10px 20px;border-radius:99px;z-index:99;opacity:0;transition:all .25s;pointer-events:none;white-space:nowrap;box-shadow:0 4px 16px rgba(124,58,237,.4);}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

.hint{font-size:12px;color:#bbb;padding:4px 16px 8px;line-height:1.6;}
</style>
</head>
<body>
<div class="app" id="app">
  <div class="sb"><span id="clk">--:--</span><span>📶 🔋</span></div>
  <div class="scr" id="root"></div>
  <div class="toast" id="toast"></div>
</div>
<script>
const PROXY='/api/proxy';
const ME=[{n:'화남',i:'😤'},{n:'슬픔',i:'😢'},{n:'불안',i:'😰'},{n:'우울',i:'😔'},{n:'지침',i:'😩'},{n:'공허함',i:'🌑'},{n:'혼란',i:'🌀'},{n:'기쁨',i:'😊'},{n:'기타',i:'✏️'}];
const SE={'화남':['짜증남','억울함','서운함','배신감','무시당한 느낌'],'슬픔':['외로움','그리움','실망','상실감','허탈함'],'불안':['초조함','두려움','걱정','긴장','불확실함'],'우울':['무기력','절망','자책','무감각','허무함'],'지침':['번아웃','과부하','피로감','포기하고 싶음','방전됨'],'공허함':['허무함','의욕없음','텅 빈 느낌','존재감 없음','아무것도 하기 싫음'],'혼란':['갈등','모르겠음','복잡함','결정 못하겠음','뒤죽박죽'],'기쁨':['설렘','감사함','뿌듯함','행복함','만족감'],'기타':[]};
const BO=['가슴이 답답함','목이 막히는 느낌','머리가 무거움','눈물이 날 것 같음','손발이 떨림','배가 뒤틀림','몸에 힘이 없음','심장이 빠르게 뜀','얼굴이 달아오름','아무것도 안 느껴짐'];
const TR=['육아/가족','일/업무','관계','돈/경제','건강','내면/자존감'];
const RT=['연인','친구','직장/상사','가족','지인'];
const WP=['작심삼일 반복','운동 못 지킴','공부 계획 무너짐','식단 실패','기상 시간 못 지킴','기타'];
const EC={'화남':'#f87171','슬픔':'#60a5fa','불안':'#fbbf24','우울':'#a78bfa','지침':'#fb923c','공허함':'#94a3b8','혼란':'#34d399','기쁨':'#4ade80','기타':'#e879f9'};
const MENU_COLORS=[
  {bg:'#ffe4e4',icon:'#f87171'},{bg:'#e0f2fe',icon:'#38bdf8'},
  {bg:'#dcfce7',icon:'#4ade80'},{bg:'#fef3c7',icon:'#fbbf24'}
];

let S={scr:'home',logs:JSON.parse(localStorage.getItem('iv_logs')||'[]'),e:{main:'',icon:'',subs:[],bodies:[],bt:'',ce:'',trig:'',memo:'',res:null,step:0},r:{type:'',sit:'',react:'',res:null,step:0},w:{pat:'',desc:'',res:null,step:0}};

function toast(m){const t=document.getElementById('toast');t.textContent=m;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2200);}
function savelog(e){S.logs=[e,...S.logs];localStorage.setItem('iv_logs',JSON.stringify(S.logs));}

async function ai(prompt){
  const fullPrompt=prompt+'\n\n반드시 순수한 JSON만 응답해. { 로 시작하고 } 로 끝나야 해. 다른 텍스트 절대 금지.';
  const r=await fetch(PROXY,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({model:'claude-sonnet-4-6',max_tokens:2000,messages:[{role:'user',content:fullPrompt}]})});
  if(!r.ok)throw new Error('HTTP '+r.status);
  const d=await r.json();
  const raw=(d.content?.[0]?.text||'');
  const text=raw.replace(/```json/g,'').replace(/```/g,'').trim();
  try{return JSON.parse(text);}
  catch(e){const m=text.match(/\{[\s\S]*\}/);if(m){try{return JSON.parse(m[0]);}catch(e2){}}throw new Error('파싱실패: '+raw.substring(0,80));}
}

function backSvg(){return`<svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="#7c3aed" stroke-width="2.5" stroke-linecap="round"><path d="M10 3L5 8l5 5"/></svg>`;}

function render(){
  const root=document.getElementById('root');
  if(S.scr==='home')root.innerHTML=home();
  else if(S.scr==='emotion')root.innerHTML=emotion();
  else if(S.scr==='relation')root.innerHTML=relation();
  else if(S.scr==='will')root.innerHTML=will();
  else if(S.scr==='pattern')root.innerHTML=pattern();
  bind();
}

function home(){
  const wc=S.logs.filter(l=>(Date.now()-l.id)<604800000).length;
  const total=S.logs.length;
  const menus=[
    {id:'emotion',icon:'💭',title:'감정 기록',desc:'지금 내 감정 분석'},
    {id:'relation',icon:'💬',title:'관계 분석',desc:'상대 심리 파악'},
    {id:'will',icon:'⚡',title:'의지 코칭',desc:'습관 패턴 깨기'},
    {id:'pattern',icon:'📊',title:'내 패턴',desc:'기록 인사이트'},
  ];
  return`
  <div class="home-header">
    <p class="eyebrow">Innerview</p>
    <h1 class="big-title">나를<br>인터뷰하다</h1>
    <p class="sub">내면을 들여다보는 시간 ✨</p>
  </div>
  <div class="menu-grid">
    ${menus.map((m,i)=>`
      <button class="menu-card" data-nav="${m.id}">
        <div class="menu-card-icon" style="background:${MENU_COLORS[i].bg};">${m.icon}</div>
        <div>
          <div class="menu-card-title">${m.title}</div>
          <div class="menu-card-desc">${m.desc}</div>
        </div>
      </button>`).join('')}
  </div>
  <div class="week-card">
    <div class="week-label">이번 주 기록</div>
    <div class="week-stats">
      <div class="week-stat"><span class="week-stat-num">${wc}</span><span class="week-stat-label">이번 주</span></div>
      <div class="week-stat"><span class="week-stat-num" style="color:#10b981">${total}</span><span class="week-stat-label">총 기록</span></div>
    </div>
  </div>`;
}

function hdr(title,eyebrow){
  return`<div class="page-header">
    <button class="back-btn" data-nav="home">${backSvg()}</button>
    <div><p class="page-eyebrow">${eyebrow||'Innerview'}</p><h2 class="page-title">${title}</h2></div>
  </div>`;
}

function emotion(){
  const e=S.e;let c='';
  if(e.step===0){
    c=`<div class="sh"><span class="sl">지금 어떤 감정이야?</span></div>
<div class="emo-grid">${ME.map(m=>`<button class="emo-btn" data-emo="${m.n}" data-ei="${m.i}"><span class="emo-icon">${m.i}</span><span class="emo-label">${m.n}</span></button>`).join('')}</div>`;
  }else if(e.step===1){
    c=`<div class="sh"><span class="sl">${e.icon} ${e.main}의 세부 감정</span><button class="prev-btn" data-estep="0">${backSvg()} 이전</button></div>
<div class="chips">${(SE[e.main]||[]).map(s=>`<button class="chip${e.subs.includes(s)?' on':''}" data-sub="${s}">${s}</button>`).join('')}</div>
<textarea placeholder="여기 없으면 직접 써줘" id="ce">${e.ce}</textarea>
<button class="pbtn" data-estep="2">신체 반응 체크 →</button>`;
  }else if(e.step===2){
    c=`<div class="sh"><span class="sl">몸에서 어떤 반응이 느껴져?</span><button class="prev-btn" data-estep="1">${backSvg()} 이전</button></div>
<p class="hint">해당하는 것 모두 선택해줘</p>
<div class="body-grid">${BO.map(b=>`<button class="body-btn${e.bodies.includes(b)?' on':''}" data-body="${b}">${b}</button>`).join('')}</div>
<textarea placeholder="목록에 없는 반응이 있으면 써줘" id="bt">${e.bt}</textarea>
<button class="pbtn" data-estep="3">트리거 선택 →</button>`;
  }else if(e.step===3){
    c=`<div class="sh"><span class="sl">어떤 상황에서 생겼어?</span><button class="prev-btn" data-estep="2">${backSvg()} 이전</button></div>
<div class="trigger-grid">${TR.map(t=>`<button class="trigger-btn${e.trig===t?' on':''}" data-trig="${t}">${t}</button>`).join('')}</div>
<button class="pbtn" data-estep="4" style="margin-top:16px">메모 남기기 →</button>`;
  }else if(e.step===4){
    c=`<div class="sh"><span class="sl">어떤 상황이었어?</span><button class="prev-btn" data-estep="3">${backSvg()} 이전</button></div>
<p class="hint">선택 사항이야. 짧게라도 써줘 🙂</p>
<textarea rows="4" placeholder="예: 아이가 말을 안 들어서 화가 났다" id="memo">${e.memo}</textarea>
${!e.res?`<button class="pbtn" id="eanal">🧠 감정 분석하기</button>`:''}
${e.res?eresult(e.res):''}
${e.res?`<button class="reset-btn" id="ereset">✏️ 새로 기록하기</button>`:''}`;
  }
  return hdr('감정 기록','💭 감정')+c;
}

function eresult(r){
  return`<div class="result-card">
<span class="result-label" style="color:#9b59d4">분석 결과</span>
<p class="result-main">실제 감정: <span style="color:#7c3aed">${r.realEmotion}</span></p>
<p class="result-match" style="color:${r.match?'#10b981':'#f472b6'}">${r.match?'✓ ':'↺ '}${r.matchComment}</p>
<p class="result-body">${r.analysis}</p>
<div class="evidence-box">
  <p class="evidence-label">판단 근거</p>
  <p class="evidence-text">${r.evidence}</p>
</div></div>
<div class="result-green">
<span class="result-label" style="color:#059669">해소 방법 💚</span>
<p class="suggestion-text">${r.suggestion}</p>
</div>`;
}

function relation(){
  const r=S.r;let c='';
  if(r.step===0){
    c=`<div class="sh"><span class="sl">어떤 관계에서 생긴 일이야?</span></div>
<div class="rel-grid">${RT.map(t=>`<button class="rel-btn" data-rtype="${t}">${t}</button>`).join('')}</div>`;
  }else if(r.step===1){
    c=`<div class="sh"><span class="sl">${r.type}과의 상황</span><button class="prev-btn" data-rstep="0">${backSvg()} 이전</button></div>
<p class="hint">카톡 내용이나 상황을 자유롭게 써줘</p>
<textarea rows="5" placeholder="예: 친구가 갑자기 연락을 끊었어..." id="sit">${r.sit}</textarea>
<button class="pbtn" data-rstep="2">내 반응 입력 →</button>`;
  }else if(r.step===2){
    c=`<div class="sh"><span class="sl">나는 어떻게 반응했어?</span><button class="prev-btn" data-rstep="1">${backSvg()} 이전</button></div>
<textarea rows="3" placeholder="예: 참았다 / 화를 냈다 / 말을 못 했다" id="react">${r.react}</textarea>
${!r.res?`<button class="pbtn" id="ranal">🧠 관계 분석하기</button>`:''}
${r.res?rresult(r.res):''}
${r.res?`<button class="reset-btn" id="rreset">새 상황 분석하기</button>`:''}`;
  }
  return hdr('관계 분석','💬 관계')+c;
}

function rresult(r){
  return`<div class="result-card">
<span class="result-label" style="color:#38bdf8">상대방 심리 🔍</span>
<p class="result-body" style="margin-bottom:14px">${r.otherPsych}</p>
<span class="result-label" style="color:#f472b6">내 반응 패턴 💭</span>
<p class="result-body" style="margin-bottom:14px">${r.myPattern}</p>
<span class="result-label" style="color:#f59e0b">근본 원인 🌱</span>
<p class="result-body">${r.rootCause}</p></div>
<div class="result-green">
<span class="result-label" style="color:#059669">이렇게 대응해 💚</span>
<p class="suggestion-text" style="margin-bottom:12px;white-space:pre-line">${r.action}</p>
<div class="warn-box">
  <p style="font-size:11px;color:#ef4444;font-weight:800;margin-bottom:4px">⚠️ 이건 하지 마</p>
  <p style="font-size:13px;color:#dc2626;line-height:1.6">${r.warning}</p>
</div></div>`;
}

function will(){
  const w=S.w;let c='';
  if(w.step===0){
    c=`<div class="sh"><span class="sl">어떤 패턴이 반복돼?</span></div>
<p class="hint">의지력 탓이 아니야. 패턴을 알면 바꿀 수 있어 💪</p>
${WP.map(p=>`<button class="list-item" data-wpat="${p}">${p}</button>`).join('')}`;
  }else if(w.step===1){
    c=`<div class="sh"><span class="sl">"${w.pat}"<br>구체적으로 어떤 상황이야?</span><button class="prev-btn" data-wstep="0">${backSvg()} 이전</button></div>
<textarea rows="5" placeholder="예: 매일 운동하려고 알람 맞추는데 끄고 자버려..." id="wdesc">${w.desc}</textarea>
${!w.res?`<button class="pbtn" id="wanal">🧠 패턴 분석하기</button>`:''}
${w.res?wresult(w.res):''}
${w.res?`<button class="reset-btn" id="wreset">다른 패턴 분석하기</button>`:''}`;
  }
  return hdr('의지 코칭','⚡ 습관')+c;
}

function wresult(r){
  return`<div class="result-card">
<span class="result-label" style="color:#f472b6">진짜 실패 원인 🔍</span>
<p class="result-body" style="margin-bottom:12px">${r.whyFail}</p>
<div style="background:#fdf4ff;border-radius:12px;padding:14px;margin-bottom:4px;border-left:3px solid #e879f9">
  <p style="font-size:11px;color:#a855f7;font-weight:800;margin-bottom:5px">💡 잘못된 믿음</p>
  <p style="font-size:13px;color:#7e22ce;line-height:1.6">${r.myth}</p>
</div></div>
<div class="result-green">
<span class="result-label" style="color:#059669">환경 설계 🏗️</span>
<p class="suggestion-text" style="margin-bottom:12px;white-space:pre-line">${r.design}</p>
<span class="result-label" style="color:#059669">습관 루프 재설계 🔄</span>
<p class="suggestion-text" style="margin-bottom:12px">${r.habit}</p>
<div style="background:rgba(255,255,255,.7);border-radius:12px;padding:14px">
  <p style="font-size:11px;color:#059669;font-weight:800;margin-bottom:4px">⚡ 오늘 딱 하나만</p>
  <p style="font-size:14px;color:#065f46;line-height:1.6;font-weight:700">${r.oneStep}</p>
</div></div>`;
}

function pattern(){
  const logs=S.logs;
  const eL=logs.filter(l=>l.type==='emotion');
  const cnt={};eL.forEach(l=>{cnt[l.mainEmotion]=(cnt[l.mainEmotion]||0)+1;});
  const tc={};eL.forEach(l=>{if(l.trig)tc[l.trig]=(tc[l.trig]||0)+1;});
  const topE=Object.entries(cnt).sort((a,b)=>b[1]-a[1]);
  const topT=Object.entries(tc).sort((a,b)=>b[1]-a[1])[0];
  const wL=eL.filter(l=>(Date.now()-l.id)<604800000);
  const bars=topE.slice(0,5).map(([e,c])=>{
    const col=EC[e]||'#888';const p=Math.round((c/eL.length)*100);
    return`<div style="margin-bottom:10px">
<div style="display:flex;justify-content:space-between;margin-bottom:4px">
<span style="font-size:13px;color:#555;font-weight:600">${e}</span>
<span style="font-size:12px;color:${col};font-weight:700">${c}회 (${p}%)</span></div>
<div class="bar-bg"><div class="bar-fill" style="width:${p}%;background:${col}"></div></div></div>`;
  }).join('');
  return hdr('내 패턴','📊 분석')+`
<div class="stat-grid">
  <div class="stat-box"><p style="font-size:22px;font-weight:900;color:#7c3aed">${logs.length}</p><p style="font-size:11px;color:#bbb;margin-top:3px">총 기록</p></div>
  <div class="stat-box"><p style="font-size:20px;font-weight:900;color:#10b981">${wL.length}</p><p style="font-size:11px;color:#bbb;margin-top:3px">이번 주</p></div>
  <div class="stat-box"><p style="font-size:12px;font-weight:900;color:#f59e0b">${topT?topT[0]:'-'}</p><p style="font-size:11px;color:#bbb;margin-top:3px">주요 트리거</p></div>
</div>
${topE.length?`<div style="margin:0 16px 12px;background:#fff;border-radius:20px;padding:18px;box-shadow:0 1px 8px rgba(0,0,0,.06)">
<p style="font-size:11px;font-weight:800;color:#b39ddb;letter-spacing:1px;text-transform:uppercase;margin-bottom:14px">감정 분포</p>${bars}</div>`:''}
${logs.length===0?`<div style="text-align:center;padding:48px 20px;color:#ddd"><div style="font-size:48px;margin-bottom:12px">🌸</div><p style="font-size:14px;line-height:1.8;color:#ccc">아직 기록이 없어요<br>감정을 기록하면 패턴이 보여요</p></div>`:''}
${logs.slice(0,6).map(l=>`<div class="log-item">
<div style="display:flex;justify-content:space-between;margin-bottom:6px">
<span style="font-size:11px;color:#bbb">${l.date} ${l.time}</span>
${l.trig?`<span style="font-size:11px;background:#fff8e8;color:#d97706;padding:2px 10px;border-radius:99px;font-weight:700">${l.trig}</span>`:''}
</div>
<div style="display:flex;align-items:center;gap:8px;margin-bottom:4px">
<span style="font-size:18px">${l.mainIcon||''}</span>
<span style="font-size:14px;font-weight:800;color:#1a1a2e">${l.mainEmotion||l.type}</span>
${l.aiRes&&!l.aiRes.match?`<span style="font-size:11px;background:#f5eeff;color:#7c3aed;padding:2px 8px;border-radius:99px;font-weight:700">→ ${l.aiRes.realEmotion}</span>`:''}
</div>
${l.aiRes&&l.aiRes.analysis?`<p style="font-size:12px;color:#bbb;line-height:1.5">${l.aiRes.analysis.substring(0,55)}...</p>`:''}</div>`).join('')}`;
}

function bind(){
  document.querySelectorAll('[data-nav]').forEach(el=>el.addEventListener('click',()=>{S.scr=el.dataset.nav;render();}));
  document.querySelectorAll('[data-emo]').forEach(el=>el.addEventListener('click',()=>{S.e.main=el.dataset.emo;S.e.icon=el.dataset.ei;S.e.subs=[];S.e.res=null;S.e.step=1;render();}));
  document.querySelectorAll('[data-sub]').forEach(el=>el.addEventListener('click',()=>{const s=el.dataset.sub;const i=S.e.subs.indexOf(s);i>-1?S.e.subs.splice(i,1):S.e.subs.push(s);el.classList.toggle('on');}));
  document.querySelectorAll('[data-body]').forEach(el=>el.addEventListener('click',()=>{const b=el.dataset.body;const i=S.e.bodies.indexOf(b);i>-1?S.e.bodies.splice(i,1):S.e.bodies.push(b);el.classList.toggle('on');}));
  document.querySelectorAll('[data-trig]').forEach(el=>el.addEventListener('click',()=>{S.e.trig=S.e.trig===el.dataset.trig?'':el.dataset.trig;render();}));
  document.querySelectorAll('[data-estep]').forEach(el=>el.addEventListener('click',()=>{
    const st=parseInt(el.dataset.estep);
    if(st===2&&document.getElementById('ce'))S.e.ce=document.getElementById('ce').value;
    if(st===3&&document.getElementById('bt'))S.e.bt=document.getElementById('bt').value;
    S.e.step=st;render();
  }));
  const ea=document.getElementById('eanal');
  if(ea)ea.addEventListener('click',async()=>{
    if(document.getElementById('memo'))S.e.memo=document.getElementById('memo').value;
    ea.disabled=true;ea.textContent='분석 중... 🧠';
    const sl=S.e.subs.join(', ')||S.e.ce||'없음';
    const bl=[...S.e.bodies,...(S.e.bt?[S.e.bt]:[])].join(', ')||'없음';
    try{
      const r=await ai(`심리학 전문가로서 분석해줘.\n큰감정: ${S.e.main}, 세부: ${sl}, 신체반응: ${bl}, 트리거: ${S.e.trig||'없음'}, 상황: ${S.e.memo||'없음'}\nWilliam James 감정이론, Lisa Feldman Barrett, 폴에크만 참고. JSON만 응답:\n{"realEmotion":"실제감정","match":true,"matchComment":"한문장","analysis":"3문장","evidence":"1. xxx\\n2. xxx\\n3. xxx","suggestion":"1. 즉각해소법(근거)\\n2. 근본해소법(근거)"}`);
      S.e.res=r;
      savelog({id:Date.now(),type:'emotion',date:new Date().toLocaleDateString('ko-KR'),time:new Date().toLocaleTimeString('ko-KR',{hour:'2-digit',minute:'2-digit'}),mainEmotion:S.e.main,mainIcon:S.e.icon,trig:S.e.trig,memo:S.e.memo,aiRes:r});
      toast('✅ 기록이 저장됐어요');render();
    }catch(e){ea.disabled=false;ea.textContent='🧠 감정 분석하기';alert('오류: '+e.message);}
  });
  const er=document.getElementById('ereset');
  if(er)er.addEventListener('click',()=>{S.e={main:'',icon:'',subs:[],bodies:[],bt:'',ce:'',trig:'',memo:'',res:null,step:0};render();});
  document.querySelectorAll('[data-rtype]').forEach(el=>el.addEventListener('click',()=>{S.r.type=el.dataset.rtype;S.r.step=1;render();}));
  document.querySelectorAll('[data-rstep]').forEach(el=>el.addEventListener('click',()=>{
    const st=parseInt(el.dataset.rstep);
    if(st===2&&document.getElementById('sit'))S.r.sit=document.getElementById('sit').value;
    S.r.step=st;render();
  }));
  const ra=document.getElementById('ranal');
  if(ra)ra.addEventListener('click',async()=>{
    if(document.getElementById('sit'))S.r.sit=document.getElementById('sit').value;
    if(document.getElementById('react'))S.r.react=document.getElementById('react').value;
    ra.disabled=true;ra.textContent='분석 중... 🧠';
    try{
      const r=await ai(`심리학 전문가로서 관계 갈등을 분석해줘.\n관계: ${S.r.type}, 상황: ${S.r.sit}, 내반응: ${S.r.react||'없음'}\n애착이론, 인지왜곡, 방어기제 관점. JSON만 응답:\n{"otherPsych":"상대심리2~3문장","myPattern":"내패턴2문장","rootCause":"근본원인(심리학개념포함)","action":"대응방법2가지(번호)","warning":"하지말것1가지"}`);
      S.r.res=r;
      savelog({id:Date.now(),type:'relation',date:new Date().toLocaleDateString('ko-KR'),time:new Date().toLocaleTimeString('ko-KR',{hour:'2-digit',minute:'2-digit'}),relType:S.r.type,aiRes:r});
      toast('✅ 분석이 저장됐어요');render();
    }catch(e){ra.disabled=false;ra.textContent='🧠 관계 분석하기';alert('오류: '+e.message);}
  });
  const rr=document.getElementById('rreset');
  if(rr)rr.addEventListener('click',()=>{S.r={type:'',sit:'',react:'',res:null,step:0};render();});
  document.querySelectorAll('[data-wpat]').forEach(el=>el.addEventListener('click',()=>{S.w.pat=el.dataset.wpat;S.w.step=1;render();}));
  document.querySelectorAll('[data-wstep]').forEach(el=>el.addEventListener('click',()=>{S.w.step=parseInt(el.dataset.wstep);render();}));
  const wa=document.getElementById('wanal');
  if(wa)wa.addEventListener('click',async()=>{
    if(document.getElementById('wdesc'))S.w.desc=document.getElementById('wdesc').value;
    wa.disabled=true;wa.textContent='분석 중... 🧠';
    try{
      const r=await ai(`행동변화 심리학 전문가로서 분석해줘.\n패턴: ${S.w.pat}, 상황: ${S.w.desc||'없음'}\nBaumeister 자아고갈, BJ Fogg 행동설계, Duhigg 습관루프 관점. JSON만 응답:\n{"whyFail":"실패원인(심리학근거)3문장","myth":"잘못된믿음2문장","design":"환경설계2가지(구체적)","habit":"습관루프재설계","oneStep":"오늘딱하나"}`);
      S.w.res=r;
      toast('✅ 코칭이 저장됐어요');render();
    }catch(e){wa.disabled=false;wa.textContent='🧠 패턴 분석하기';alert('오류: '+e.message);}
  });
  const wr=document.getElementById('wreset');
  if(wr)wr.addEventListener('click',()=>{S.w={pat:'',desc:'',res:null,step:0};render();});
}

function tick(){const n=new Date();document.getElementById('clk').textContent=n.getHours()+':'+String(n.getMinutes()).padStart(2,'0');}
setInterval(tick,10000);tick();
render();
</script>
</body>
</html>
